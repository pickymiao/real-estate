<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ESTATE PRO v28.9 - 全面解鎖版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; color: #0f172a; }
        .tab-btn.active { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: 800; }
        .card { background: white; border-radius: 1.25rem; border: 1px solid #e2e8f0; padding: 1.25rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .status-pill { padding: 2px 10px; border-radius: 99px; font-size: 10px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        select { background: #fff; border: 1px solid #cbd5e1; border-radius: 0.75rem; padding: 0.6rem; font-size: 0.8rem; width: 100%; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-end mb-8 gap-6">
        <div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">ESTATE ENGINE <span class="text-indigo-600">v28.9</span></h1>
            <p class="text-slate-400 font-bold mt-2 text-[10px] tracking-widest uppercase">No-Filter Mode & Direct Mapping</p>
        </div>
        
        <div class="flex gap-4 items-center">
            <div id="syncStatus" class="status-pill bg-slate-100 text-slate-500"><span id="syncText">等待中...</span></div>
            
            <div class="flex flex-col items-center">
                <button onclick="document.getElementById('preInput').click()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-md">🏠 上傳預售</button>
                <div id="preInfo" class="status-pill bg-indigo-50 text-indigo-600 mt-2 text-[9px]">DB: 0</div>
            </div>
            <div class="flex flex-col items-center">
                <button onclick="document.getElementById('resInput').click()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold text-xs shadow-md">🏢 上傳中古</button>
                <div id="resInfo" class="status-pill bg-slate-100 text-slate-600 mt-2 text-[9px]">DB: 0</div>
            </div>
            <input type="file" id="preInput" class="hidden" accept=".csv" onchange="handleManualUpload(this.files, 'presale')">
            <input type="file" id="resInput" class="hidden" accept=".csv" onchange="handleManualUpload(this.files, 'resale')">
        </div>
    </header>

    <div class="max-w-7xl mx-auto mb-6 bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-[10px] text-emerald-800 font-mono">
        <div class="font-bold mb-1">✅ 解鎖版診斷：目前已關閉「非住宅」攔截器，強制讀入所有有價格的資料。</div>
        <div id="presaleLog">等待操作...</div>
        <div id="resaleLog">等待操作...</div>
    </div>

    <div class="max-w-7xl mx-auto flex gap-10 border-b-2 border-slate-200 mb-6">
        <button id="btn-presale" onclick="changeTab('presale')" class="tab-btn active py-4 text-xs font-bold uppercase tracking-widest">Presale / 預售屋</button>
        <button id="btn-resale" onclick="changeTab('resale')" class="tab-btn py-4 text-xs font-bold text-slate-400 uppercase tracking-widest">Resale / 中古屋</button>
    </div>

    <main class="max-w-7xl mx-auto">
        <div class="card mb-8 grid grid-cols-2 md:grid-cols-6 gap-4">
            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400">區域</label><select id="fDist" onchange="saveState('dist', this.value)"></select></div>
            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400">房型</label><select id="fRoom" onchange="saveState('room', this.value)"><option value="all">全部</option><option value="1房">1房</option><option value="2房">2房</option><option value="3房">3房</option><option value="4房以上">4房以上</option></select></div>
            <div id="ageGroup" class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400">屋齡</label><select id="fAge" onchange="saveState('age', this.value)"><option value="all">不限</option><option value="0-5">5年內</option><option value="5-10">5-10年</option><option value="10-20">10-20年</option><option value="20+">20年以上</option></select></div>
            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400">起始</label><select id="fStart" onchange="saveState('start', this.value)"></select></div>
            <div class="flex flex-col gap-1.5"><label class="text-[10px] font-black text-slate-400">結束</label><select id="fEnd" onchange="saveState('end', this.value)"></select></div>
            <div class="flex items-end"><button onclick="copyRichData()" class="w-full bg-indigo-600 text-white py-2.5 rounded-xl text-[10px] font-bold">📋 複製數據</button></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <div class="card h-[300px]"><canvas id="chartVol"></canvas></div>
            <div class="card h-[300px]"><canvas id="chartPrice"></canvas></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="card"><h4 class="text-[10px] font-black mb-4">區域均價</h4><div id="rankDistPrice" class="space-y-3"></div></div>
            <div class="card"><h4 class="text-[10px] font-black mb-4">成交量</h4><div id="rankDistVol" class="space-y-3"></div></div>
            <div class="card"><h4 class="text-[10px] font-black mb-4">最高單價</h4><div id="rankItemPrice" class="space-y-3"></div></div>
            <div class="card"><h4 class="text-[10px] font-black mb-4">熱門案件</h4><div id="rankItemHot" class="space-y-3"></div></div>
        </div>
    </main>

    <script>
        const CLOUD = {
            presale: "https://raw.githubusercontent.com/pickymiao/real-estate/main/presale.csv",
            resale: "https://raw.githubusercontent.com/pickymiao/real-estate/main/resale.csv"
        };

        let db;
        let MEMORY = { presale: [], resale: [] };
        let STATES = { 
            presale: { dist: 'all', room: 'all', age: 'all', start: '', end: '' },
            resale: { dist: 'all', room: 'all', age: 'all', start: '', end: '' }
        };
        let CURRENT_TAB = 'presale';
        let chartInstances = {};

        // ⚠️ 再次升級版本號至 v30，確保乾淨開局
        const dbReq = indexedDB.open("EstateDB_v30", 1);
        dbReq.onupgradeneeded = (e) => {
            let _db = e.target.result;
            if(!_db.objectStoreNames.contains("presale")) _db.createObjectStore("presale", { keyPath: "uid" });
            if(!_db.objectStoreNames.contains("resale")) _db.createObjectStore("resale", { keyPath: "uid" });
        };
        dbReq.onsuccess = (e) => { db = e.target.result; init(); };

        async function init() {
            await loadFromDB();
            updateSyncUI('同步中...');
            await sync(CLOUD.presale, 'presale');
            await sync(CLOUD.resale, 'resale');
            updateSyncUI('同步完成');
        }

        async function sync(url, type) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Github 連結失效");
                const buffer = await res.arrayBuffer();
                const text = await decodeBuffer(buffer);
                await process(text, type);
            } catch (e) { 
                document.getElementById(`${type}Log`).innerText = `無法載入 Github 檔案，請點擊按鈕手動上傳。`;
            }
        }

        async function handleManualUpload(files, type) { 
            const buffer = await files[0].arrayBuffer(); 
            const text = await decodeBuffer(buffer);
            await process(text, type); 
        }

        async function decodeBuffer(buffer) {
            let text = new TextDecoder('utf-8').decode(buffer);
            if (text.includes('')) text = new TextDecoder('big5').decode(buffer);
            return text.trim().replace(/^\uFEFF/, '');
        }

        async function process(csvText, type) {
            const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true, transformHeader: h => h.trim() });
            if (parsed.data.length === 0) return;

            const tx = db.transaction(type, "readwrite");
            const store = tx.objectStore(type);
            let saved = 0;

            parsed.data.forEach(row => {
                const keys = Object.keys(row);
                // 強化尋找欄位的邏輯
                const findValue = (k) => {
                    const foundKey = keys.find(x => x.toLowerCase().includes(k.toLowerCase()));
                    return foundKey ? row[foundKey] : null;
                };

                const dist = findValue('district') || findValue('鄉鎮市區');
                const pricePerPing = parseFloat(findValue('rps22')) || 0; // 單價(元/平方公尺)
                const dateRaw = findValue('rps07') || findValue('交易年月');

                // 基本門檻：必須有區域、日期、價格
                if (!dist || !dateRaw || pricePerPing <= 0) return;

                const dateClean = String(dateRaw).substring(0, 5); // 取 11301 這種格式
                
                // 名稱判斷
                let name = "";
                if (type === 'presale') {
                    name = findValue('rps28') || "未知案名";
                } else {
                    const sec = findValue('rps02') || "";
                    name = sec.split(/[樓室之]/)[0].replace("新北市", "").trim().substring(0, 10);
                }

                const roomVal = parseInt(findValue('rps16')) || 0;
                const buildDate = String(findValue('rps14') || "0");
                const age = type === 'presale' ? 0 : Math.max(0, parseInt(dateRaw.substring(0, 3)) - parseInt(buildDate.substring(0, 3)));

                store.put({
                    uid: `${dist}_${dateRaw}_${pricePerPing}_${Math.random()}`,
                    dist: dist.trim(), 
                    name: name.trim(), 
                    age,
                    price: (pricePerPing / 0.3025) / 10000, // 換算成萬/坪
                    date: dateClean,
                    room: roomVal >= 4 ? "4房以上" : roomVal + "房"
                });
                saved++;
            });

            document.getElementById(`${type}Log`).innerText = `成功存入 ${saved} 筆資料到本地資料庫！`;

            return new Promise(r => { tx.oncomplete = async () => { await loadFromDB(); r(); }; });
        }

        async function loadFromDB() {
            MEMORY.presale = await getAll("presale");
            MEMORY.resale = await getAll("resale");
            document.getElementById('preInfo').innerText = `DB: ${MEMORY.presale.length}`;
            document.getElementById('resInfo').innerText = `DB: ${MEMORY.resale.length}`;
            refreshUI();
        }

        function getAll(s) {
            return new Promise(r => {
                const tx = db.transaction(s, "readonly");
                const req = tx.objectStore(s).getAll();
                req.onsuccess = () => r(req.result);
            });
        }

        function refreshUI() {
            const data = MEMORY[CURRENT_TAB];
            if (data.length === 0) return;

            const dists = [...new Set(data.map(d => d.dist))].sort();
            const dates = [...new Set(data.map(d => d.date))].sort();
            
            document.getElementById('fDist').innerHTML = '<option value="all">全部區域</option>' + dists.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fStart').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fEnd').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');

            document.getElementById('fDist').value = STATES[CURRENT_TAB].dist;
            document.getElementById('fStart').value = STATES[CURRENT_TAB].start || dates[0];
            document.getElementById('fEnd').value = STATES[CURRENT_TAB].end || dates[dates.length-1];
            runFilter();
        }

        function runFilter() {
            const data = MEMORY[CURRENT_TAB];
            const s = STATES[CURRENT_TAB];
            const filtered = data.filter(d => {
                const mDist = s.dist === 'all' || d.dist === s.dist;
                const mRoom = s.room === 'all' || d.room === s.room;
                const mDate = d.date >= (s.start || "0") && d.date <= (s.end || "99999");
                let mAge = true;
                if (CURRENT_TAB === 'resale' && s.age !== 'all') {
                    if (s.age === '0-5') mAge = d.age <= 5;
                    else if (s.age === '5-10') mAge = d.age > 5 && d.age <= 10;
                    else if (s.age === '10-20') mAge = d.age > 10 && d.age <= 20;
                    else if (s.age === '20+') mAge = d.age > 20;
                }
                return mDist && mRoom && mDate && mAge;
            });
            render(filtered);
        }

        function render(data) {
            const dates = [...new Set(data.map(d => d.date))].sort();
            const color = CURRENT_TAB === 'presale' ? '#4f46e5' : '#1e293b';

            updateChart('chartPrice', 'line', dates, [{
                label: '均價(萬)', borderColor: color, tension: 0.3,
                data: dates.map(d => {
                    const items = data.filter(i => i.date === d);
                    return (items.reduce((a, b) => a + b.price, 0) / items.length).toFixed(1);
                })
            }]);

            updateChart('chartVol', 'bar', dates, [{
                label: '件數', backgroundColor: color,
                data: dates.map(d => data.filter(i => i.date === d).length)
            }]);

            const dStats = {};
            data.forEach(d => { if(!dStats[d.dist]) dStats[d.dist]={s:0,c:0}; dStats[d.dist].s+=d.price; dStats[d.dist].c++; });
            
            renderList('rankDistPrice', Object.entries(dStats).map(([k,v])=>({n:k, v:(v.s/v.c).toFixed(1)})).sort((a,b)=>b.v-a.v).slice(0,5), '萬');
            renderList('rankDistVol', Object.entries(dStats).map(([k,v])=>({n:k, v:v.c})).sort((a,b)=>b.v-a.v).slice(0,5), '件');
            renderList('rankItemPrice', [...data].sort((a,b)=>b.price-a.price).slice(0,5).map(d=>({n:d.name, v:d.price.toFixed(1)})), '萬');
            
            const hot = {}; data.forEach(d => hot[d.name] = (hot[d.name]||0)+1);
            renderList('rankItemHot', Object.entries(hot).map(([k,v])=>({n:k, v})).sort((a,b)=>b.v-a.v).slice(0,5), '戶');
        }

        function updateChart(id, type, labels, datasets) {
            if (chartInstances[id]) chartInstances[id].destroy();
            chartInstances[id] = new Chart(document.getElementById(id), {
                type, data: { labels, datasets },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderList(id, list, unit) {
            document.getElementById(id).innerHTML = list.map((d, i) => `
                <div class="flex justify-between text-[11px]">
                    <span class="truncate font-bold text-slate-600">${i+1}. ${d.n}</span>
                    <span class="font-black text-slate-900">${d.v}${unit}</span>
                </div>
            `).join('');
        }

        function changeTab(t) { 
            CURRENT_TAB = t; 
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${t}`));
            document.getElementById('ageGroup').style.opacity = t === 'presale' ? '0.3' : '1';
            refreshUI(); 
        }
        function saveState(k, v) { STATES[CURRENT_TAB][k] = v; runFilter(); }
        function updateSyncUI(t) { document.getElementById('syncText').innerText = t; }
    </script>
</body>
</html>
