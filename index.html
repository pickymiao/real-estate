<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>房產決策系統 v16.0 | 多維篩選儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <style>
        .chart-container { position: relative; height: 300px; width: 100%; }
        .filter-group { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        select { background-color: #f1f5f9; border-radius: 0.75rem; padding: 0.5rem 1rem; font-weight: 600; outline: none; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="bg-white border-b px-8 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏙️</span>
                <h1 class="text-xl font-black italic">ESTATE <span class="text-indigo-600">PRO</span></h1>
            </div>
            
            <div class="filter-group">
                <select id="districtFilter" onchange="handleMainFilterChange()">
                    <option value="all">所有區域</option>
                </select>
                <select id="typeFilter" onchange="handleTypeChange()">
                    <option value="all">中古+預售</option>
                    <option value="presale">僅看預售屋</option>
                    <option value="secondhand">僅看中古屋</option>
                </select>
                <div id="subFilterContainer" class="flex gap-2"></div>
                
                <button onclick="switchTab('admin')" class="ml-4 px-4 py-2 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-lg">⚙️ 數據管理</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-6">
        <div id="view-dashboard" class="space-y-6">
            
            <div class="bg-slate-900 rounded-[2rem] p-6 text-white shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold flex items-center gap-2">✨ AI 深度解讀 <span id="analysisTarget" class="text-xs bg-white/20 px-2 py-1 rounded">全區分析</span></h2>
                    <button onclick="runAI()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-6 py-2 rounded-xl text-sm font-black transition">生成報告</button>
                </div>
                <div id="ai-content" class="text-slate-300 text-sm leading-relaxed min-h-[60px]">請同步數據後點擊生成。</div>
            </div>

            <div id="chartGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-500 mb-4">每月成交量趨勢 (戶)</h3>
                    <div class="chart-container"><canvas id="chartVol"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-500 mb-4">每月成交單價趨勢 (萬/坪)</h3>
                    <div class="chart-container"><canvas id="chartPrice"></canvas></div>
                </div>
                <div id="areaPieBox" class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-500 mb-4">區域總銷售佔比 (%)</h3>
                    <div class="chart-container"><canvas id="chartPie"></canvas></div>
                </div>
                <div id="areaBarBox" class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <h3 class="text-sm font-bold text-slate-500 mb-4">各區平均單價對比 (萬/坪)</h3>
                    <div class="chart-container"><canvas id="chartBar"></canvas></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-200">
                    <h3 class="text-sm font-black text-amber-600 mb-4 tracking-tighter">🏆 預售屋單價 TOP 5</h3>
                    <div id="listPrice" class="space-y-2 text-xs"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200">
                    <h3 class="text-sm font-black text-amber-600 mb-4 tracking-tighter">🔥 預售屋銷量 TOP 5</h3>
                    <div id="listVol" class="space-y-2 text-xs"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-200">
                    <h3 class="text-sm font-black text-indigo-600 mb-4 tracking-tighter">🏘️ 中古屋單價 TOP 5</h3>
                    <div id="listSecond" class="space-y-2 text-xs"></div>
                </div>
            </div>

            <footer class="text-center py-10 border-t border-slate-200 space-y-1">
                <p class="text-xs text-slate-400 font-bold">數據分析區間：<span id="footerRange" class="text-slate-600">--</span></p>
                <p class="text-[10px] text-slate-300">最後更新時間：<span id="footerUpdate">--</span></p>
            </footer>
        </div>

        <div id="view-admin" class="hidden max-w-xl mx-auto py-10">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border">
                <h2 class="text-xl font-black mb-6">⚙️ 數據同步</h2>
                <div class="space-y-4">
                    <input type="password" id="apiKeyInput" placeholder="Gemini API Key" class="w-full px-4 py-3 bg-slate-50 rounded-xl border">
                    <div class="p-4 bg-amber-50 rounded-xl border border-amber-100">
                        <label class="text-xs font-bold text-amber-800">預售屋 (B檔)</label>
                        <input type="file" id="csvB" accept=".csv" class="w-full mt-1">
                    </div>
                    <div class="p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                        <label class="text-xs font-bold text-indigo-800">中古屋 (A檔)</label>
                        <input type="file" id="csvA" accept=".csv" class="w-full mt-1">
                    </div>
                    <button onclick="processFiles()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg">更新數據</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let rawA = [], rawB = [], charts = {};

        // 初始化
        window.onload = () => {
            const savedKey = localStorage.getItem('housing_api_key');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        };

        function switchTab(t) {
            document.getElementById('view-dashboard').classList.toggle('hidden', t !== 'dashboard');
            document.getElementById('view-admin').classList.toggle('hidden', t !== 'admin');
        }

        async function processFiles() {
            const fileA = document.getElementById('csvA').files[0];
            const fileB = document.getElementById('csvB').files[0];
            const key = document.getElementById('apiKeyInput').value.trim();
            if(key) localStorage.setItem('housing_api_key', key);
            if(!fileA || !fileB) return alert("請選取檔案");

            const parse = (f) => new Promise(res => Papa.parse(f, { header: true, skipEmptyLines: true, complete: res }));
            const [resA, resB] = await Promise.all([parse(fileA), parse(fileB)]);

            rawA = cleanData(resA.data, true);
            rawB = cleanData(resB.data, false);

            initFilters();
            refreshUI();
            updateFooter();
            switchTab('dashboard');
        }

        function cleanData(data, isSH) {
            const seen = new Set();
            return data.filter(r => {
                const id = r['編號'] || (r['土地位置建物門牌'] + r['交易年月日']);
                if (seen.has(id)) return false; seen.add(id);
                if (isSH) {
                    if (!(r['主要用途'] || "").includes('住家')) return false;
                    // 計算屋齡 (假設民國年 115)
                    const year = r['建築完成年月'] ? parseInt(r['建築完成年月'].substring(0,3)) : 0;
                    r._age = year > 0 ? (115 - year) : "未知";
                }
                // 房型推論 (根據建物現況格局-房)
                r._rooms = r['建物現況格局-房'] ? r['建物現況格局-房'] + '房' : '未知';
                return r['單價元平方公尺'] && !isNaN(parseFloat(r['單價元平方公尺']));
            });
        }

        function initFilters() {
            const dists = new Set([...rawA.map(r => r['鄉鎮市區']), ...rawB.map(r => r['鄉鎮市區'])]);
            const select = document.getElementById('districtFilter');
            select.innerHTML = '<option value="all">所有區域</option>' + 
                Array.from(dists).filter(d => d).sort().map(d => `<option value="${d}">${d}</option>`).join('');
        }

        function handleMainFilterChange() { refreshUI(); }

        function handleTypeChange() {
            const type = document.getElementById('typeFilter').value;
            const container = document.getElementById('subFilterContainer');
            container.innerHTML = "";

            if (type === 'presale') {
                // 建案篩選
                const cases = [...new Set(rawB.map(r => r['建案名稱']))].filter(c => c);
                const s1 = createSelect('caseFilter', '所有建案', cases);
                container.appendChild(s1);
                // 房型篩選
                const rooms = [...new Set(rawB.map(r => r._rooms))].sort();
                const s2 = createSelect('roomFilter', '所有房型', rooms);
                container.appendChild(s2);
            } else if (type === 'secondhand') {
                // 屋齡篩選 (簡單分類)
                const ageRanges = ["0-5年", "5-10年", "10-20年", "20年以上"];
                const s1 = createSelect('ageFilter', '所有屋齡', ageRanges);
                container.appendChild(s1);
                // 房型篩選
                const rooms = [...new Set(rawA.map(r => r._rooms))].sort();
                const s2 = createSelect('roomFilter', '所有房型', rooms);
                container.appendChild(s2);
            }
            refreshUI();
        }

        function createSelect(id, defaultText, options) {
            const s = document.createElement('select');
            s.id = id;
            s.onchange = refreshUI;
            s.innerHTML = `<option value="all">${defaultText}</option>` + 
                options.map(o => `<option value="${o}">${o}</option>`).join('');
            return s;
        }

        function refreshUI() {
            const district = document.getElementById('districtFilter').value;
            const mainType = document.getElementById('typeFilter').value;
            
            // 基礎過濾
            let fa = rawA.filter(r => district === 'all' || r['鄉鎮市區'] === district);
            let fb = rawB.filter(r => district === 'all' || r['鄉鎮市區'] === district);

            // 進階過濾
            if (mainType === 'presale') {
                const c = document.getElementById('caseFilter')?.value;
                const r = document.getElementById('roomFilter')?.value;
                fb = fb.filter(x => (c === 'all' || x['建案名稱'] === c) && (r === 'all' || x._rooms === r));
                fa = []; // 僅看預售時清空中古屋
            } else if (mainType === 'secondhand') {
                const a = document.getElementById('ageFilter')?.value;
                const r = document.getElementById('roomFilter')?.value;
                fa = fa.filter(x => {
                    const roomMatch = (r === 'all' || x._rooms === r);
                    if (a === 'all') return roomMatch;
                    if (a === "0-5年") return x._age <= 5 && roomMatch;
                    if (a === "5-10年") return x._age > 5 && x._age <= 10 && roomMatch;
                    if (a === "10-20年") return x._age > 10 && x._age <= 20 && roomMatch;
                    if (a === "20年以上") return x._age > 20 && roomMatch;
                    return roomMatch;
                });
                fb = [];
            }

            // 切換情境圖表顯示
            const isAll = district === 'all';
            document.getElementById('areaPieBox').style.display = isAll ? 'block' : 'none';
            document.getElementById('areaBarBox').style.display = isAll ? 'block' : 'none';

            renderCharts(fa, fb, isAll);
            renderRankings(fa, fb);
            document.getElementById('analysisTarget').innerText = isAll ? '全區分析' : district;
        }

        function renderCharts(fa, fb, isAll) {
            const months = Array.from(new Set([...fa.map(r=>r['交易年月日']?.substring(0,5)), ...fb.map(r=>r['交易年月日']?.substring(0,5))])).filter(m=>m).sort();
            const getStats = (data) => {
                const res = {};
                data.forEach(r => {
                    const m = r['交易年月日']?.substring(0, 5); if(!m) return;
                    if(!res[m]) res[m] = { vol: 0, sumPrice: 0, count: 0 };
                    res[m].vol++; 
                    res[m].sumPrice += (parseFloat(r['單價元平方公尺']) * 3.3058 / 10000);
                    res[m].count++;
                });
                return res;
            };
            const sA = getStats(fa), sB = getStats(fb);

            updateChart('chartVol', 'line', months, [
                { label: '預售銷量', data: months.map(m=>sB[m]?.vol || 0), borderColor: '#f59e0b' },
                { label: '中古銷量', data: months.map(m=>sA[m]?.vol || 0), borderColor: '#6366f1' }
            ]);

            updateChart('chartPrice', 'line', months, [
                { label: '預售均價', data: months.map(m=>sB[m]?.count ? (sB[m].sumPrice/sB[m].count).toFixed(1) : null), borderColor: '#f59e0b' },
                { label: '中古均價', data: months.map(m=>sA[m]?.count ? (sA[m].sumPrice/sA[m].count).toFixed(1) : null), borderColor: '#6366f1' }
            ]);

            if (isAll) {
                // 圓餅圖與長條圖
                const dists = [...new Set([...fa.map(r=>r['鄉鎮市區']), ...fb.map(r=>r['鄉鎮市區'])])].filter(d=>d);
                const pieData = dists.map(d => {
                    const count = fa.filter(r=>r['鄉鎮市區']===d).length + fb.filter(r=>r['鄉鎮市區']===d).length;
                    return count;
                });
                updateChart('chartPie', 'doughnut', dists, [{ data: pieData, backgroundColor: ['#6366f1','#f59e0b','#10b981','#f43f5e','#8b5cf6'] }]);
                
                const barPrice = dists.map(d => {
                    const subA = fa.filter(r=>r['鄉鎮市區']===d);
                    const subB = fb.filter(r=>r['鄉鎮市區']===d);
                    const totalP = subA.reduce((acc,curr)=>acc+(parseFloat(curr['單價元平方公尺'])*3.3058/10000),0) + subB.reduce((acc,curr)=>acc+(parseFloat(curr['單價元平方公尺'])*3.3058/10000),0);
                    const totalC = subA.length + subB.length;
                    return totalC ? (totalP/totalC).toFixed(1) : 0;
                });
                updateChart('chartBar', 'bar', dists, [{ label: '均價', data: barPrice, backgroundColor: '#cbd5e1' }]);
            }
        }

        function updateChart(id, type, labels, datasets) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type, data: { labels, datasets },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });
        }

        function renderRankings(fa, fb) {
            const getRank = (data, field, isVol = false) => {
                const g = {};
                data.forEach(r => {
                    const n = r[field]?.split('號')[0] || "未知";
                    const p = (parseFloat(r['單價元平方公尺']) * 3.3058 / 10000);
                    if(!g[n]) g[n] = { val: 0, count: 0 };
                    if(isVol) g[n].val++; else { g[n].val += p; g[n].count++; }
                });
                return Object.entries(g).map(([name, s]) => ({ name, score: isVol ? s.val : (s.val/s.count).toFixed(1) }))
                    .sort((a,b)=>b.score - a.score).slice(0,5);
            };

            const drawList = (id, list, unit) => {
                document.getElementById(id).innerHTML = list.map((it, i) => `
                    <div class="flex justify-between border-b border-slate-50 pb-1">
                        <span class="truncate w-32">${i+1}. ${it.name}</span>
                        <span class="font-bold text-slate-700">${it.score} ${unit}</span>
                    </div>`).join('');
            };

            drawList('listPrice', getRank(fb, '建案名稱'), '萬');
            drawList('listVol', getRank(fb, '建案名稱', true), '戶');
            drawList('listSecond', getRank(fa, '土地位置建物門牌'), '萬');
        }

        function updateFooter() {
            const dates = [...rawA.map(r=>r['交易年月日']), ...rawB.map(r=>r['交易年月日'])].filter(d=>d).sort();
            if(dates.length) {
                document.getElementById('footerRange').innerText = `${dates[0]} ~ ${dates[dates.length-1]}`;
            }
            document.getElementById('footerUpdate').innerText = new Date().toLocaleString();
        }

        async function runAI() {
            const key = localStorage.getItem('housing_api_key');
            if(!key) return alert("請輸入 API Key");
            const aiArea = document.getElementById('ai-content');
            aiArea.innerText = "正在分析目前的數據與篩選條件...";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const prompt = `分析目前房市數據。中古屋數量:${rawA.length}, 預售屋數量:${rawB.length}。請針對目前數據給予三點趨勢總結。`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                aiArea.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (e) { aiArea.innerText = "分析失敗，請檢查 Key。"; }
        }
    </script>
</body>
</html>
