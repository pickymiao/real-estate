<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ESTATE PRO v36.0 - 手機同步修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .tab-btn.active { border-color: #4f46e5; color: #4f46e5; font-weight: 800; background: #f5f3ff; }
        .card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; padding: 1.25rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-7xl mx-auto mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-slate-800 tracking-tight">ESTATE <span class="text-indigo-600">v36.0</span></h1>
            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Mobile Sync Optimized</p>
        </div>
        <div class="flex gap-2">
            <button onclick="syncAll()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-xs shadow-md">🔄 同步</button>
            <button onclick="document.getElementById('fileIn').click()" class="bg-white border px-4 py-2 rounded-lg font-bold text-xs">📁 上傳</button>
            <input type="file" id="fileIn" class="hidden" multiple onchange="handleFiles(this.files)">
        </div>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-2 gap-3 mb-6">
        <div class="bg-white border p-3 rounded-xl shadow-sm">
            <span class="text-[9px] font-black text-indigo-500 block">🏠 預售 (筆數)</span>
            <div id="preCount" class="text-lg font-black text-slate-700">0</div>
            <div id="preLog" class="text-[8px] text-slate-400 truncate">等待中...</div>
        </div>
        <div class="bg-white border p-3 rounded-xl shadow-sm">
            <span class="text-[9px] font-black text-slate-500 block">🏢 中古 (筆數)</span>
            <div id="resCount" class="text-lg font-black text-slate-700">0</div>
            <div id="resLog" class="text-[8px] text-slate-400 truncate">等待中...</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto flex mb-6 bg-white rounded-xl p-1 border shadow-sm">
        <button id="tab-presale" onclick="switchMode('presale')" class="active flex-1 py-2.5 text-xs font-black rounded-lg">預售</button>
        <button id="tab-resale" onclick="switchMode('resale')" class="flex-1 py-2.5 text-xs font-black rounded-lg">中古</button>
    </div>

    <main class="max-w-7xl mx-auto">
        <div class="card mb-6 grid grid-cols-2 md:grid-cols-5 gap-3">
            <div class="col-span-1"><label class="text-[9px] font-black text-slate-400 uppercase">區域</label><select id="fDist" class="w-full mt-1 border rounded-md p-1.5 text-sm" onchange="run()"></select></div>
            <div class="col-span-1"><label class="text-[9px] font-black text-slate-400 uppercase">房型</label><select id="fRoom" class="w-full mt-1 border rounded-md p-1.5 text-sm" onchange="run()"><option value="all">全部</option><option value="1">1房</option><option value="2">2房</option><option value="3">3房</option><option value="4">4+</option></select></div>
            <div class="col-span-2 md:col-span-2"><label class="text-[9px] font-black text-slate-400 uppercase">交易區間</label><div class="flex gap-1 mt-1"><select id="fStart" class="w-1/2 border rounded-md p-1.5 text-sm" onchange="run()"></select><select id="fEnd" class="w-1/2 border rounded-md p-1.5 text-sm" onchange="run()"></select></div></div>
            <button onclick="window.print()" class="col-span-2 md:col-span-1 bg-slate-900 text-white py-2 rounded-lg text-xs font-bold mt-auto">📋 導出</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="card h-[280px]"><canvas id="chartVol"></canvas></div>
            <div class="card h-[280px]"><canvas id="chartPrice"></canvas></div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="stats">
            <div class="card p-3"><h4 class="text-[9px] font-black text-slate-400 border-b pb-2 mb-2">區域均價</h4><div id="rankPrice" class="space-y-1.5"></div></div>
            <div class="card p-3"><h4 class="text-[9px] font-black text-slate-400 border-b pb-2 mb-2">成交總量</h4><div id="rankVol" class="space-y-1.5"></div></div>
            <div class="card p-3"><h4 class="text-[9px] font-black text-slate-400 border-b pb-2 mb-2">最高單價</h4><div id="rankTop" class="space-y-1.5"></div></div>
            <div class="card p-3"><h4 class="text-[9px] font-black text-slate-400 border-b pb-2 mb-2">熱門案件</h4><div id="rankHot" class="space-y-1.5"></div></div>
        </div>
    </main>

    <script>
        const CLOUD = { 
            presale: "https://raw.githubusercontent.com/pickymiao/real-estate/main/presale.csv", 
            resale: "https://raw.githubusercontent.com/pickymiao/real-estate/main/resale.csv" 
        };
        let db, MEMORY = { presale: [], resale: [] }, MODE = 'presale', charts = {}, monthlyTops = {};

        // 💡 關鍵修復：提高版本號到 v43，強制清空手機端錯誤資料
        const req = indexedDB.open("EstateMaster_v43", 1);
        req.onupgradeneeded = e => {
            let _db = e.target.result;
            if(!_db.objectStoreNames.contains("presale")) _db.createObjectStore("presale", { keyPath: "uid" });
            if(!_db.objectStoreNames.contains("resale")) _db.createObjectStore("resale", { keyPath: "uid" });
        };
        req.onsuccess = e => { db = e.target.result; syncAll(); };

        async function syncAll() {
            log('pre', 'Sync...'); log('res', 'Sync...');
            // 💡 加上隨機參數避免快取
            await Promise.all([syncFile(CLOUD.presale, 'presale'), syncFile(CLOUD.resale, 'resale')]);
            load();
        }

        async function syncFile(url, type) {
            try {
                const res = await fetch(url + "?t=" + Date.now(), { mode: 'cors' });
                const buf = await res.arrayBuffer();
                await process(buf, type);
            } catch (e) { log(type==='presale'?'pre':'res', '網路連線異常'); }
        }

        async function handleFiles(files) {
            for (let f of files) {
                const type = f.name.includes('resale') ? 'resale' : 'presale';
                await process(await f.arrayBuffer(), type);
            }
            load();
        }

        async function process(buffer, type) {
            let text;
            try { text = new TextDecoder('big5', { fatal: true }).decode(buffer); } 
            catch(e) { text = new TextDecoder('utf-8').decode(buffer); }

            const parsed = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
            const tx = db.transaction(type, "readwrite");
            const store = tx.objectStore(type);
            let count = 0;

            parsed.data.forEach(row => {
                const keys = Object.keys(row);
                const getV = (kws) => {
                    const key = keys.find(k => kws.some(kw => k.toLowerCase().includes(kw.toLowerCase())));
                    return key ? row[key] : null;
                };

                const dist = getV(['district', '鄉鎮市區']);
                const priceUnit = parseFloat(getV(['rps22', '單價', 'amountsunit'])) || 0;
                const dateRaw = getV(['rps07', '交易年月', 'yyymmdd']);
                const uid = getV(['rps27', 'rps31', '編號']) || (Math.random() + '');

                if (!dist || !dateRaw || priceUnit <= 0) return;

                const date = String(dateRaw).substring(0, 5);
                const price = (priceUnit / 0.3025) / 10000;
                
                const r = parseInt(getV(['rps16'])) || 0;
                const t = parseInt(getV(['rps17'])) || 0;
                const w = parseInt(getV(['rps18'])) || 0;
                
                let name = "";
                if (type === 'presale') {
                    name = getV(['rps28', '建案名稱']) || "案件";
                } else {
                    const addr = getV(['rps02', '位置']) || "";
                    name = addr.replace("新北市", "").split(/[號樓室之]/)[0].trim().substring(0, 8);
                }

                store.put({
                    uid, district: dist.trim(), name: name.trim(), price, date, 
                    room: r >= 4 ? "4" : String(r), 
                    desc: `${r}/${t}/${w}`
                });
                count++;
            });
            log(type==='presale'?'pre':'res', `成功 ${count} 筆`);
            return new Promise(r => tx.oncomplete = r);
        }

        async function load() {
            MEMORY.presale = await getDB('presale');
            MEMORY.resale = await getDB('resale');
            document.getElementById('preCount').innerText = MEMORY.presale.length;
            document.getElementById('resCount').innerText = MEMORY.resale.length;
            initUI();
        }

        function getDB(s) { return new Promise(r => { const req = db.transaction(s,"readonly").objectStore(s).getAll(); req.onsuccess = () => r(req.result); }); }

        function initUI() {
            const data = MEMORY[MODE];
            if (!data.length) return;
            const dists = [...new Set(data.map(d => d.district))].sort();
            const dates = [...new Set(data.map(d => d.date))].sort();
            document.getElementById('fDist').innerHTML = '<option value="all">全部</option>' + dists.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fStart').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fEnd').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fEnd').value = dates[dates.length-1];
            run();
        }

        function run() {
            const data = MEMORY[MODE];
            const dist = document.getElementById('fDist').value;
            const room = document.getElementById('fRoom').value;
            const start = document.getElementById('fStart').value;
            const end = document.getElementById('fEnd').value;

            const filtered = data.filter(d => {
                return (dist === 'all' || d.district === dist) &&
                       (room === 'all' || d.room === room) &&
                       (d.date >= start && d.date <= end);
            });
            render(filtered);
        }

        function render(data) {
            const dates = [...new Set(data.map(d => d.date))].sort();
            const color = MODE === 'presale' ? '#4f46e5' : '#475569';
            
            monthlyTops = {};
            dates.forEach(d => {
                const m = data.filter(i => i.date === d);
                if (m.length) {
                    const top = m.reduce((p, c) => (p.price > c.price) ? p : c);
                    monthlyTops[d] = { name: top.name, price: top.price.toFixed(1), desc: top.desc };
                }
            });

            updateChart('chartPrice', 'line', dates, [{
                label: '均價', data: dates.map(d => {
                    const items = data.filter(i => i.date === d);
                    return (items.reduce((a, b) => a + b.price, 0) / items.length).toFixed(1);
                }), borderColor: color, fill: true, backgroundColor: color + '10'
            }], true);

            updateChart('chartVol', 'bar', dates, [{
                label: '量', data: dates.map(d => data.filter(i => i.date === d).length), backgroundColor: color + '40'
            }]);

            const dMap = {}; data.forEach(d => { if(!dMap[d.district]) dMap[d.district]={s:0,c:0}; dMap[d.district].s+=d.price; dMap[d.district].c++; });
            showList('rankPrice', Object.entries(dMap).map(([k,v])=>({n:k, v:(v.s/v.c).toFixed(1)})).sort((a,b)=>b.v-a.v).slice(0,5), '萬');
            showList('rankVol', Object.entries(dMap).map(([k,v])=>({n:k, v:v.c})).sort((a,b)=>b.v-a.v).slice(0,5), '件');
            showList('rankTop', [...data].sort((a,b)=>b.price-a.price).slice(0,5).map(d=>({n:d.name, v:d.price.toFixed(1), s: d.desc})), '萬');
            const hMap = {}; data.forEach(d => hMap[d.name] = (hMap[d.name]||0)+1);
            showList('rankHot', Object.entries(hMap).map(([k,v])=>({n:k, v})).sort((a,b)=>b.v-a.v).slice(0,5), '戶');
        }

        function updateChart(id, type, labels, datasets, tip = false) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type, data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function showList(id, list, unit) {
            document.getElementById(id).innerHTML = list.map((d, i) => `
                <div class="flex justify-between text-[10px] border-b pb-1">
                    <span class="truncate w-20 font-bold">${i+1}. ${d.n}</span>
                    <span class="font-black">${d.v}${unit}</span>
                </div>
            `).join('');
        }

        function switchMode(m) { 
            MODE = m; 
            document.getElementById('tab-presale').className = m==='presale'?'active flex-1 py-2.5 text-xs font-black rounded-lg':'flex-1 py-2.5 text-xs font-black rounded-lg';
            document.getElementById('tab-resale').className = m==='resale'?'active flex-1 py-2.5 text-xs font-black rounded-lg':'flex-1 py-2.5 text-xs font-black rounded-lg';
            initUI(); 
        }
        function log(t, m) { document.getElementById(`${t}Log`).innerText = m; }
    </script>
</body>
</html>
