<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房產數據儀表板 v16.2 - 專業分析版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-slate-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span class="bg-blue-500 p-1 rounded text-sm">v16.2</span>
                房產數據動態儀表板
            </h1>
            <div class="flex items-center gap-4">
                <input type="password" id="apiKey" placeholder="輸入 Gemini API Key" class="bg-slate-800 border border-slate-700 rounded px-3 py-1 text-sm focus:outline-none focus:border-blue-400">
                <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-lg text-sm font-medium transition-all">
                    上傳實價登錄 CSV
                </button>
                <input type="file" id="fileInput" multiple accept=".csv" class="hidden" onchange="handleFiles(this.files)">
            </div>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4">
        
        <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">房產類型</label>
                <select id="typeFilter" onchange="applyFilters()" class="w-full border-slate-200 rounded-lg text-sm">
                    <option value="all">全部類型</option>
                    <option value="預售屋">預售屋</option>
                    <option value="中古屋">中古屋</option>
                </select>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <label class="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">行政區域</label>
                <select id="districtFilter" onchange="applyFilters()" class="w-full border-slate-200 rounded-lg text-sm">
                    <option value="all">全區域</option>
                </select>
            </div>
            <div id="dynamicFilterContainer" class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 col-span-2">
                <label class="block text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">進階篩選</label>
                <div id="dynamicFilterUI" class="text-slate-400 text-sm py-1 italic">請先選擇房產類型...</div>
            </div>
        </section>

        <div id="dashboardStats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8 hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2">
                <h3 class="font-bold text-slate-700 mb-4">月成交量趨勢</h3>
                <div class="chart-container"><canvas id="salesChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2">
                <h3 class="font-bold text-slate-700 mb-4">均價趨勢 (萬/坪)</h3>
                <div class="chart-container"><canvas id="priceChart"></canvas></div>
            </div>
            <div id="ratioCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2">
                <h3 class="font-bold text-slate-700 mb-4">區域銷量分佈</h3>
                <div class="chart-container"><canvas id="ratioChart"></canvas></div>
            </div>
            <div id="rankPriceCard" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2">
                <h3 class="font-bold text-slate-700 mb-4">區域平均單價</h3>
                <div class="chart-container"><canvas id="regionPriceChart"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 class="font-bold text-slate-700">數據排行榜 (Top 5)</h3>
                        <span class="text-xs text-slate-400">依單價排序</span>
                    </div>
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500">
                            <tr>
                                <th class="p-4 font-medium">社區/建案</th>
                                <th class="p-4 font-medium">行政區</th>
                                <th class="p-4 font-medium">單價(萬)</th>
                                <th class="p-4 font-medium">房型</th>
                            </tr>
                        </thead>
                        <tbody id="topListBody">
                            <tr><td colspan="4" class="p-8 text-center text-slate-400">等待數據上傳...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-lg text-white">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            AI 市場洞察
                        </h3>
                        <button onclick="generateAIAnalysis()" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded text-xs transition-all">動態解析</button>
                    </div>
                    <div id="aiContent" class="text-sm leading-relaxed opacity-90 min-h-[150px]">
                        請先上傳 CSV 資料並輸入 API Key，點擊「動態解析」獲取分析報告。
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container mx-auto py-8 px-4 text-center text-slate-400 text-xs border-t border-slate-200 mt-12">
        <div id="dataInfo">目前無數據</div>
        <div class="mt-2 text-slate-300">Technology: PapaParse | Chart.js | Tailwind | Gemini 1.5 Flash</div>
    </footer>

    <script>
        // 核心資料庫
        let RAW_DATA = [];
        let charts = {};

        // 1. 處理檔案上傳
        async function handleFiles(files) {
            let combinedData = [];
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => resolve(results.data)
                    });
                });
            });

            const datasets = await Promise.all(promises);
            datasets.forEach(data => {
                combinedData = combinedData.concat(data);
            });

            processSmartMerge(combinedData);
        }

        // 2. 智慧合併與清洗 (v16.2 Core Logic)
        function processSmartMerge(data) {
            const uniqueRecords = new Map();
            const districts = new Set();

            data.forEach(item => {
                // A. 欄位標準化
                const addr = item['土地位置建物門牌'] || item['土地位置'];
                const date = item['交易年月'];
                const price = item['總價元'];
                const district = item['鄉鎮市區'];
                
                if (!addr || !date || !price) return;

                // B. 去重機制 (識別碼: 門牌+日期+總價)
                const key = `${addr}_${date}_${price}`;
                if (uniqueRecords.has(key)) return;

                // C. 區分預售與中古
                let type = "中古屋";
                let buildingName = "未知社區";
                if (item['建案名稱']) {
                    type = "預售屋";
                    buildingName = item['建案名稱'];
                } else {
                    // 從門牌嘗試提取社區關鍵字 (簡單正則)
                    const match = addr.match(/[\u4e00-\u9fa5]+(社區|大廈|大樓|園區|華廈)/);
                    buildingName = match ? match[0] : addr.split('號')[0] + '號...';
                }

                // D. 屋齡計算 (以 115 年為基準)
                let age = 0;
                if (item['建築完成年月'] && item['建築完成年月'].length >= 3) {
                    const year = parseInt(item['建築完成年月'].substring(0, 3));
                    age = 115 - year;
                }

                const processed = {
                    ...item,
                    _type: type,
                    _name: buildingName,
                    _age: age,
                    _district: district,
                    _unitPrice: parseFloat(item['單價元平方公尺']) * 0.3025 / 10000 || 0, // 轉為萬/坪
                    _date: date
                };

                uniqueRecords.set(key, processed);
                if (district) districts.add(district);
            });

            RAW_DATA = Array.from(uniqueRecords.values());
            
            // 更新篩選器
            updateDistrictFilter(districts);
            document.getElementById('dashboardStats').classList.remove('hidden');
            applyFilters();
            updateFooter();
        }

        function updateDistrictFilter(districts) {
            const select = document.getElementById('districtFilter');
            select.innerHTML = '<option value="all">全區域</option>';
            Array.from(districts).sort().forEach(d => {
                select.innerHTML += `<option value="${d}">${d}</option>`;
            });
        }

        // 3. 篩選與動態 UI
        function applyFilters() {
            const type = document.getElementById('typeFilter').value;
            const district = document.getElementById('districtFilter').value;
            
            // 動態調整 UI 面板
            const dynamicUI = document.getElementById('dynamicFilterUI');
            if (type === '預售屋') {
                dynamicUI.innerHTML = `<input type="text" placeholder="搜尋建案..." class="border rounded px-2 py-1 text-xs w-full" onkeyup="filterBySub(this.value)">`;
            } else if (type === '中古屋') {
                dynamicUI.innerHTML = `<select class="border rounded px-2 py-1 text-xs w-full" onchange="filterByAge(this.value)">
                    <option value="all">不限屋齡</option>
                    <option value="0-10">10年內</option>
                    <option value="11-30">11-30年</option>
                    <option value="31-99">31年以上</option>
                </select>`;
            } else {
                dynamicUI.innerHTML = `請選擇房產類型獲取更多篩選功能`;
            }

            // 執行數據過濾
            let filtered = RAW_DATA;
            if (type !== 'all') filtered = filtered.filter(d => d._type === type);
            if (district !== 'all') {
                filtered = filtered.filter(d => d._district === district);
                document.getElementById('ratioCard').classList.add('hidden');
            } else {
                document.getElementById('ratioCard').classList.remove('hidden');
            }

            updateCharts(filtered);
            updateTable(filtered);
        }

        // 4. 圖表渲染
        function updateCharts(data) {
            const months = [...new Set(data.map(d => d._date))].sort();
            const salesData = months.map(m => data.filter(d => d._date === m).length);
            const priceData = months.map(m => {
                const items = data.filter(d => d._date === m);
                const avg = items.reduce((sum, curr) => sum + curr._unitPrice, 0) / items.length;
                return avg.toFixed(2);
            });

            renderChart('salesChart', 'bar', months, salesData, '成交戶數', '#3b82f6');
            renderChart('priceChart', 'line', months, priceData, '均價(萬/坪)', '#10b981');
            
            // 區域佔比圓餅圖
            const districtCounts = {};
            data.forEach(d => districtCounts[d._district] = (districtCounts[d._district] || 0) + 1);
            renderChart('ratioChart', 'pie', Object.keys(districtCounts), Object.values(districtCounts), '區域分佈');
            
            // 區域均價長條圖
            const districtPrices = {};
            Object.keys(districtCounts).forEach(d => {
                const items = data.filter(i => i._district === d);
                districtPrices[d] = (items.reduce((sum, curr) => sum + curr._unitPrice, 0) / items.length).toFixed(1);
            });
            renderChart('regionPriceChart', 'bar', Object.keys(districtPrices), Object.values(districtPrices), '區域均價', '#f59e0b');
        }

        function renderChart(id, type, labels, data, label, color) {
            if (charts[id]) charts[id].destroy();
            const ctx = document.getElementById(id).getContext('2d');
            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        backgroundColor: type === 'pie' ? ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'] : color,
                        borderColor: color,
                        borderWidth: 1,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type === 'pie' } }
                }
            });
        }

        // 5. 排行榜更新
        function updateTable(data) {
            const sorted = [...data].sort((a, b) => b._unitPrice - a._unitPrice).slice(0, 5);
            const body = document.getElementById('topListBody');
            body.innerHTML = sorted.map(d => `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-semibold text-slate-700">${d._name}</td>
                    <td class="p-4">${d._district}</td>
                    <td class="p-4 text-blue-600 font-bold">${d._unitPrice.toFixed(1)}</td>
                    <td class="p-4 text-slate-500">${d['建物型態'].split('(')[0]}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="p-8 text-center text-slate-400">查無資料</td></tr>';
        }

        // 6. AI 整合 (Gemini 1.5 Flash)
        async function generateAIAnalysis() {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("請先輸入 Gemini API Key");
            
            const aiDisplay = document.getElementById('aiContent');
            aiDisplay.innerHTML = "正在通靈市場趨勢中...";

            // 取得目前的統計摘要
            const type = document.getElementById('typeFilter').value;
            const district = document.getElementById('districtFilter').value;
            const top5 = Array.from(document.querySelectorAll('#topListBody tr')).map(tr => tr.innerText).join('\n');

            const prompt = `你是一位資深房地產分析師。請根據以下目前的數據摘要提供3點市場洞察建議：
            1. 類型：${type}
            2. 行政區：${district}
            3. 排行榜摘要：${top5}
            請用專業、精煉的中文回答。`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const result = await resp.json();
                aiDisplay.innerHTML = result.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (err) {
                aiDisplay.innerHTML = "AI 連結失敗，請檢查 API Key 或網路狀態。";
            }
        }

        function updateFooter() {
            if (RAW_DATA.length === 0) return;
            const dates = RAW_DATA.map(d => d._date).sort();
            document.getElementById('dataInfo').innerHTML = `
                數據範圍：${dates[0]} ~ ${dates[dates.length-1]} | 
                總計筆數：${RAW_DATA.length} 筆 | 
                最後更新：${new Date().toLocaleString()}
            `;
        }
    </script>
</body>
</html>
