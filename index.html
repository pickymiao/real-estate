<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ESTATE PRO v40.0 - 欄位精準過濾</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@300;500;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: #f1f5f9; color: #334155; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid white; box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .tab-btn.active { color: #4f46e5; background: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.15); }
        .rank-item { background: white; border-left: 5px solid #e2e8f0; transition: all 0.2s; }
        .rank-item:hover { transform: translateX(8px); border-left-color: #4f46e5; background: #f5f3ff; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-6">
        <div>
            <h1 class="text-4xl font-[900] text-slate-900 tracking-tighter">ESTATE <span class="text-indigo-600">PRO</span> <span class="text-sm font-bold text-slate-400 align-top">v40.0</span></h1>
            <p class="text-sm font-bold text-slate-500 uppercase tracking-[0.2em] mt-1">Strict Residential Filter (rps12)</p>
        </div>
        <div class="flex gap-3">
            <button onclick="syncAll()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold text-sm shadow-xl hover:bg-indigo-700 transition-all">🔄 雲端資料同步</button>
            <button onclick="document.getElementById('fileIn').click()" class="bg-white text-slate-700 border border-slate-200 px-8 py-4 rounded-2xl font-bold text-sm shadow-sm">📁 上傳檔案</button>
            <input type="file" id="fileIn" class="hidden" multiple onchange="handleFiles(this.files)">
        </div>
    </header>

    <div class="max-w-7xl mx-auto grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="glass-card p-6 rounded-[2rem]">
            <span class="text-[11px] font-black text-indigo-500 uppercase tracking-widest">預售屋 (rps12:住家用)</span>
            <div id="preCount" class="text-4xl font-black text-slate-800 my-2">0</div>
            <div id="preLog" class="text-[11px] text-slate-400 truncate italic">Ready</div>
        </div>
        <div class="glass-card p-6 rounded-[2rem]">
            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">中古屋 (rps12:住家用)</span>
            <div id="resCount" class="text-4xl font-black text-slate-800 my-2">0</div>
            <div id="resLog" class="text-[11px] text-slate-400 truncate italic">Ready</div>
        </div>
        <div class="hidden lg:block glass-card p-6 rounded-[2rem] bg-slate-900 text-white border-none">
            <span class="text-[11px] font-black opacity-60 uppercase tracking-widest">分析引擎狀態</span>
            <div class="text-xl font-bold mt-3 text-indigo-300">✅ 已鎖定住家用資料</div>
        </div>
        <div class="hidden lg:block glass-card p-6 rounded-[2rem]">
            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">最後更新</span>
            <div class="text-xl font-black text-slate-700 mt-3" id="lastSyncTime">--:--</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto flex mb-8 bg-slate-200/50 rounded-[1.5rem] p-1.5 gap-2">
        <button id="tab-presale" onclick="switchMode('presale')" class="active flex-1 py-5 text-base font-black rounded-2xl transition-all">🏠 預售屋市場</button>
        <button id="tab-resale" onclick="switchMode('resale')" class="flex-1 py-5 text-base font-black rounded-2xl text-slate-500 transition-all">🏢 中古屋市場</button>
    </div>

    <main class="max-w-7xl mx-auto">
        <div class="glass-card mb-10 grid grid-cols-1 md:grid-cols-5 gap-8 items-end p-10 rounded-[2.5rem]">
            <div class="flex flex-col gap-3"><label class="text-xs font-black text-slate-500 uppercase">地理區域</label><select id="fDist" class="bg-white border-2 border-slate-100 rounded-2xl p-4 text-base font-bold outline-none" onchange="run()"></select></div>
            <div class="flex flex-col gap-3"><label class="text-xs font-black text-slate-500 uppercase">房型規劃</label><select id="fRoom" class="bg-white border-2 border-slate-100 rounded-2xl p-4 text-base font-bold outline-none" onchange="run()"><option value="all">全部房型</option><option value="1">1 房</option><option value="2">2 房</option><option value="3">3 房</option><option value="4">4 房以上</option></select></div>
            <div class="col-span-2 flex flex-col gap-3"><label class="text-xs font-black text-slate-500 uppercase">交易日期範圍</label><div class="flex gap-3"><select id="fStart" class="w-1/2 bg-white border-2 border-slate-100 rounded-2xl p-4 text-base font-bold outline-none" onchange="run()"></select><select id="fEnd" class="w-1/2 bg-white border-2 border-slate-100 rounded-2xl p-4 text-base font-bold outline-none" onchange="run()"></select></div></div>
            <button onclick="window.print()" class="bg-slate-900 text-white py-5 rounded-2xl font-black text-base shadow-2xl transition-all hover:bg-black">📋 產出分析報表</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-10">
            <div class="glass-card p-10 rounded-[2.5rem] h-[450px]">
                <h3 class="text-lg font-black mb-8 flex items-center gap-3">成交總量趨勢</h3>
                <div class="h-[300px]"><canvas id="chartVol"></canvas></div>
            </div>
            <div class="glass-card p-10 rounded-[2.5rem] h-[450px]">
                <h3 class="text-lg font-black mb-8 flex items-center gap-3">市場價格走勢 (萬/坪)</h3>
                <div class="h-[300px]"><canvas id="chartPrice"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-8" id="stats">
            <div class="glass-card p-8 rounded-[2rem]"><h4 class="text-xs font-black text-indigo-600 mb-6 border-b pb-4 uppercase">💎 區域均價</h4><div id="rankPrice" class="space-y-4"></div></div>
            <div class="glass-card p-8 rounded-[2rem]"><h4 class="text-xs font-black text-slate-500 mb-6 border-b pb-4 uppercase">🔥 熱門區域</h4><div id="rankVol" class="space-y-4"></div></div>
            <div class="glass-card p-8 rounded-[2rem]"><h4 class="text-xs font-black text-emerald-600 mb-6 border-b pb-4 uppercase">🏆 指標案件</h4><div id="rankTop" class="space-y-4"></div></div>
            <div class="glass-card p-8 rounded-[2rem]"><h4 class="text-xs font-black text-amber-600 mb-6 border-b pb-4 uppercase">📊 成交頻次</h4><div id="rankHot" class="space-y-4"></div></div>
        </div>
    </main>

    <script>
        const CLOUD = { 
            presale: "https://raw.githubusercontent.com/pickymiao/real-estate/main/presale.csv", 
            resale: "https://raw.githubusercontent.com/pickymiao/real-estate/main/resale.csv" 
        };
        let db, MEMORY = { presale: [], resale: [] }, MODE = 'presale', charts = {}, monthlyTops = {};

        // 提升版號以確保重新解析
        const req = indexedDB.open("EstateMaster_v54", 1);
        req.onupgradeneeded = e => {
            let _db = e.target.result;
            if(!_db.objectStoreNames.contains("presale")) _db.createObjectStore("presale", { keyPath: "uid" });
            if(!_db.objectStoreNames.contains("resale")) _db.createObjectStore("resale", { keyPath: "uid" });
        };
        req.onsuccess = e => { db = e.target.result; syncAll(); };

        async function syncAll() {
            await Promise.all([syncFile(CLOUD.presale, 'presale'), syncFile(CLOUD.resale, 'resale')]);
            document.getElementById('lastSyncTime').innerText = new Date().toLocaleTimeString();
            load();
        }

        async function syncFile(url, type) {
            try {
                const res = await fetch(url + "?t=" + Date.now());
                const buf = await res.arrayBuffer();
                await process(buf, type);
            } catch (e) { log(type==='presale'?'pre':'res', '連線異常'); }
        }

        async function handleFiles(files) {
            for (let f of files) {
                const type = f.name.includes('resale') ? 'resale' : 'presale';
                await process(await f.arrayBuffer(), type);
            }
            load();
        }

        async function process(buffer, type) {
            let text;
            try { text = new TextDecoder('big5', { fatal: true }).decode(buffer); } 
            catch(e) { text = new TextDecoder('utf-8').decode(buffer); }

            const parsed = Papa.parse(text.trim(), { header: true, skipEmptyLines: true });
            const tx = db.transaction(type, "readwrite");
            const store = tx.objectStore(type);
            let count = 0;

            parsed.data.forEach(row => {
                const keys = Object.keys(row);
                const getV = (kws) => {
                    const key = keys.find(k => kws.some(kw => k.toLowerCase().includes(kw.toLowerCase())));
                    return key ? row[key] : "";
                };

                // 🚀 核心邏輯修正：嚴格檢查 rps12 欄位
                const rps12 = getV(['rps12', '主要用途']);
                if (rps12 !== '住家用') return;

                const dist = getV(['district', '鄉鎮市區']);
                const priceUnit = parseFloat(getV(['rps22', '單價', 'amountsunit'])) || 0;
                const dateRaw = getV(['rps07', '交易年月', 'yyymmdd']);
                const uid = getV(['rps27', 'rps31', '編號']) || (Math.random() + '');

                if (!dist || !dateRaw || priceUnit <= 0) return;

                const date = String(dateRaw).substring(0, 5);
                const priceInWan = (priceUnit / 0.3025) / 10000;
                
                const r = parseInt(getV(['rps16'])) || 0;
                const t = parseInt(getV(['rps17'])) || 0;
                const w = parseInt(getV(['rps18'])) || 0;
                
                let name = "";
                if (type === 'presale') {
                    name = getV(['rps28', '建案名稱']) || "住家案";
                } else {
                    const addr = getV(['rps02', '位置', '土地區段']);
                    name = addr.replace("新北市", "").split(/[號樓室之]/)[0].trim().substring(0, 15);
                }

                store.put({
                    uid, district: dist.trim(), name: name.trim() || "未命名案件", price: priceInWan, date, 
                    room: r >= 4 ? "4" : String(r), desc: `${r}房/${t}廳/${w}衛`
                });
                count++;
            });
            log(type==='presale'?'pre':'res', `已過濾載入 ${count} 筆`);
            return new Promise(r => tx.oncomplete = r);
        }

        async function load() {
            MEMORY.presale = await getDB('presale');
            MEMORY.resale = await getDB('resale');
            document.getElementById('preCount').innerText = MEMORY.presale.length.toLocaleString();
            document.getElementById('resCount').innerText = MEMORY.resale.length.toLocaleString();
            initUI();
        }

        function getDB(s) { return new Promise(r => { const req = db.transaction(s,"readonly").objectStore(s).getAll(); req.onsuccess = () => r(req.result); }); }

        function initUI() {
            const data = MEMORY[MODE];
            if (!data.length) return;
            const dists = [...new Set(data.map(d => d.district))].sort();
            const dates = [...new Set(data.map(d => d.date))].sort();
            document.getElementById('fDist').innerHTML = '<option value="all">📍 全部區域</option>' + dists.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fStart').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fEnd').innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById('fEnd').value = dates[dates.length-1];
            run();
        }

        function run() {
            const data = MEMORY[MODE];
            const dist = document.getElementById('fDist').value;
            const room = document.getElementById('fRoom').value;
            const start = document.getElementById('fStart').value;
            const end = document.getElementById('fEnd').value;
            const filtered = data.filter(d => (dist === 'all' || d.district === dist) && (room === 'all' || d.room === room) && (d.date >= start && d.date <= end));
            render(filtered);
        }

        function render(data) {
            const dates = [...new Set(data.map(d => d.date))].sort();
            const color = MODE === 'presale' ? '#4f46e5' : '#64748b';
            
            monthlyTops = {};
            dates.forEach(d => {
                const m = data.filter(i => i.date === d);
                if (m.length) {
                    const top = m.reduce((p, c) => (p.price > c.price) ? p : c);
                    monthlyTops[d] = { name: top.name, price: top.price.toFixed(1), desc: top.desc };
                }
            });

            updateChart('chartPrice', 'line', dates, [{
                label: '住家均價', data: dates.map(d => {
                    const items = data.filter(i => i.date === d);
                    return (items.reduce((a, b) => a + b.price, 0) / items.length).toFixed(1);
                }), borderColor: color, borderWidth: 5, pointBackgroundColor: 'white', pointRadius: 6, fill: true, backgroundColor: color + '15'
            }], true);

            updateChart('chartVol', 'bar', dates, [{
                label: '成交量', data: dates.map(d => data.filter(i => i.date === d).length), backgroundColor: color + '40', borderRadius: 10
            }]);

            const dMap = {}; data.forEach(d => { if(!dMap[d.district]) dMap[d.district]={s:0,c:0}; dMap[d.district].s+=d.price; dMap[d.district].c++; });
            showList('rankPrice', Object.entries(dMap).map(([k,v])=>({n:k, v:(v.s/v.c).toFixed(1)})).sort((a,b)=>b.v-a.v).slice(0,5), ' 萬');
            showList('rankVol', Object.entries(dMap).map(([k,v])=>({n:k, v:v.c})).sort((a,b)=>b.v-a.v).slice(0,5), ' 件');
            showList('rankTop', [...data].sort((a,b)=>b.price-a.price).slice(0,8).map(d=>({n:d.name, v:d.price.toFixed(1), s: d.desc})), ' 萬');
            const hMap = {}; data.forEach(d => hMap[d.name] = (hMap[d.name]||0)+1);
            showList('rankHot', Object.entries(hMap).map(([k,v])=>({n:k, v})).sort((a,b)=>b.v-a.v).slice(0,8), ' 戶');
        }

        function updateChart(id, type, labels, datasets, tip = false) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type, data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)', padding: 20,
                            titleFont: { size: 16, weight: '900' },
                            bodyFont: { size: 14 },
                            callbacks: {
                                afterBody: (items) => {
                                    const t = monthlyTops[items[0].label];
                                    return (tip && t) ? ['', `🏆 指標案：${t.name}`, `💰 單價：${t.price} 萬`, `🏠 配置：${t.desc}`] : [];
                                }
                            }
                        }
                    },
                    scales: { y: { ticks: { font: { weight: 'bold' } } }, x: { ticks: { font: { weight: 'bold' } } } }
                }
            });
        }

        function showList(id, list, unit) {
            document.getElementById(id).innerHTML = list.map((d, i) => `
                <div class="rank-item flex justify-between items-center p-4 rounded-2xl shadow-sm">
                    <div class="flex flex-col truncate pr-3">
                        <span class="text-sm font-black text-slate-800">${i+1}. ${d.n}</span>
                        ${d.s ? `<span class="text-[10px] text-slate-400 font-bold uppercase mt-0.5">${d.s}</span>` : ''}
                    </div>
                    <span class="text-base font-black text-indigo-600 whitespace-nowrap">${d.v}<span class="text-xs opacity-50 ml-1 font-normal">${unit}</span></span>
                </div>
            `).join('');
        }

        function switchMode(m) { 
            MODE = m; 
            document.getElementById('tab-presale').className = m==='presale'?'active flex-1 py-5 text-base font-black rounded-2xl':'flex-1 py-5 text-base font-black rounded-2xl text-slate-500';
            document.getElementById('tab-resale').className = m==='resale'?'active flex-1 py-5 text-base font-black rounded-2xl':'flex-1 py-5 text-base font-black rounded-2xl text-slate-500';
            initUI(); 
        }
        function log(t, m) { document.getElementById(`${t}Log`).innerText = m; }
    </script>
</body>
</html>
