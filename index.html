<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATE PRO v16.2 - 房產數據動態儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .dark-header { background-color: #0f172a; }
        .ai-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="text-slate-800">

    <nav class="dark-header text-white px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1 rounded text-xs font-bold">v16.2</div>
            <h1 class="text-lg font-bold tracking-tight">ESTATE PRO <span class="font-normal text-slate-400">| 房產數據分析</span></h1>
        </div>
        
        <div class="flex items-center gap-3">
            <input type="password" id="apiKey" placeholder="輸入 Gemini API Key" class="bg-slate-800 border border-slate-700 rounded-md px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-48">
            <select id="districtFilter" onchange="applyFilters()" class="bg-slate-800 border border-slate-700 rounded-md px-2 py-1.5 text-sm outline-none"><option value="all">全區域</option></select>
            <select id="typeFilter" onchange="applyFilters()" class="bg-slate-800 border border-slate-700 rounded-md px-2 py-1.5 text-sm outline-none">
                <option value="all">所有類型</option>
                <option value="預售屋">預售專場</option>
                <option value="中古屋">中古屋</option>
            </select>
            <button onclick="document.getElementById('fileInput').click()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 rounded-md text-sm font-medium transition-all shadow-lg">
                上傳實價登錄 CSV
            </button>
            <input type="file" id="fileInput" multiple accept=".csv" class="hidden" onchange="handleFiles(this.files)">
        </div>
    </nav>

    <main class="container mx-auto max-w-7xl px-4 py-6 space-y-6">

        <section class="ai-gradient rounded-3xl p-8 shadow-2xl border border-slate-700 relative overflow-hidden">
            <div class="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">✨</span>
                    <h2 class="text-xl font-bold text-white tracking-wide">AI 深度市場洞察</h2>
                </div>
                <button onclick="generateAIAnalysis()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-2 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95 shadow-lg">
                    開始分析
                </button>
            </div>
            <div id="aiContent" class="bg-slate-900/50 rounded-2xl p-6 min-h-[120px] border border-slate-800 text-slate-300 leading-relaxed text-sm">
                請上傳 CSV 資料後，點擊「開始分析」獲取動態解析報告...
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-card p-6 rounded-3xl shadow-sm">
                <h3 class="text-slate-500 text-sm font-bold mb-4 uppercase tracking-tighter">成交量趨勢</h3>
                <div class="h-[300px]"><canvas id="salesChart"></canvas></div>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm">
                <h3 class="text-slate-500 text-sm font-bold mb-4 uppercase tracking-tighter">成交單價趨勢 (萬/坪)</h3>
                <div class="h-[300px]"><canvas id="priceChart"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card rounded-3xl p-6 shadow-sm">
                <h4 class="text-orange-600 font-bold text-sm mb-4 flex justify-between">預售單價 TOP 5 <span>萬/坪</span></h4>
                <ul id="presalePriceRank" class="space-y-4 text-sm"></ul>
            </div>
            <div class="glass-card rounded-3xl p-6 shadow-sm">
                <h4 class="text-orange-600 font-bold text-sm mb-4 flex justify-between">預售銷量 TOP 5 <span>戶數</span></h4>
                <ul id="presaleCountRank" class="space-y-4 text-sm"></ul>
            </div>
            <div class="glass-card rounded-3xl p-6 shadow-sm">
                <h4 class="text-indigo-600 font-bold text-sm mb-4 flex justify-between">中古屋單價 TOP 5 <span>萬/坪</span></h4>
                <ul id="usedPriceRank" class="space-y-4 text-sm"></ul>
            </div>
        </div>

    </main>

    <footer class="text-center py-10 text-slate-400 text-xs tracking-widest">
        <div id="dataInfo">WAITING FOR DATA</div>
        <div class="mt-2 uppercase">Core System v16.2 | Data Science Powered by Gemini</div>
    </footer>

    <script>
        let RAW_DATA = [];
        let charts = {};

        // 解決 Big5 編碼與檔案合併
        async function handleFiles(files) {
            let combinedData = [];
            for (let file of files) {
                const data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        Papa.parse(e.target.result, {
                            header: true, skipEmptyLines: true,
                            complete: (res) => resolve(res.data)
                        });
                    };
                    reader.readAsText(file, "Big5"); // 針對台灣實價登錄
                });
                combinedData = combinedData.concat(data);
            }
            processData(combinedData);
        }

        function processData(data) {
            const unique = new Map();
            const districts = new Set();

            data.forEach(item => {
                const addr = item['土地位置建物門牌'] || item['土地位置'];
                const price = item['總價元'];
                const date = item['交易年月'];
                if (!addr || !price || !date) return;

                const key = `${addr}_${date}_${price}`;
                if (unique.has(key)) return;

                let type = item['建案名稱'] ? "預售屋" : "中古屋";
                let name = item['建案名稱'] || addr.split('號')[0].substring(0, 15);
                let unitPrice = parseFloat(item['單價元平方公尺']) * 0.3025 / 10000 || 0;

                unique.set(key, {
                    ...item,
                    _type: type,
                    _name: name,
                    _district: item['鄉鎮市區'],
                    _unitPrice: unitPrice,
                    _date: date
                });
                if (item['鄉鎮市區']) districts.add(item['鄉鎮市區']);
            });

            RAW_DATA = Array.from(unique.values());
            updateDistricts(districts);
            applyFilters();
        }

        function updateDistricts(districts) {
            const el = document.getElementById('districtFilter');
            el.innerHTML = '<option value="all">全區域</option>' + 
                Array.from(districts).map(d => `<option value="${d}">${d}</option>`).join('');
        }

        function applyFilters() {
            const type = document.getElementById('typeFilter').value;
            const dist = document.getElementById('districtFilter').value;

            let filtered = RAW_DATA;
            if (type !== 'all') filtered = filtered.filter(d => d._type === type);
            if (dist !== 'all') filtered = filtered.filter(d => d._district === dist);

            updateCharts(filtered);
            updateRanks(filtered);
            
            const dates = filtered.map(d => d._date).sort();
            document.getElementById('dataInfo').innerText = `DATA RANGE: ${dates[0] || 'N/A'} - ${dates[dates.length-1] || 'N/A'} | TOTAL: ${filtered.length} RECORDS`;
        }

        function updateCharts(data) {
            const months = [...new Set(data.map(d => d._date))].sort();
            
            // 成交量圖表
            const presaleSales = months.map(m => data.filter(d => d._date === m && d._type === '預售屋').length);
            const usedSales = months.map(m => data.filter(d => d._date === m && d._type === '中古屋').length);
            
            renderChart('salesChart', months, [
                { label: '預售銷量', data: presaleSales, color: '#f97316' },
                { label: '中古銷量', data: usedSales, color: '#6366f1' }
            ], 'bar');

            // 單價圖表
            const presalePrice = months.map(m => {
                const items = data.filter(d => d._date === m && d._type === '預售屋');
                return items.length ? (items.reduce((a, b) => a + b._unitPrice, 0) / items.length).toFixed(1) : null;
            });
            const usedPrice = months.map(m => {
                const items = data.filter(d => d._date === m && d._type === '中古屋');
                return items.length ? (items.reduce((a, b) => a + b._unitPrice, 0) / items.length).toFixed(1) : null;
            });

            renderChart('priceChart', months, [
                { label: '預售均價', data: presalePrice, color: '#f97316' },
                { label: '中古均價', data: usedPrice, color: '#6366f1' }
            ], 'line');
        }

        function renderChart(id, labels, datasets, type) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type: type,
                data: {
                    labels,
                    datasets: datasets.map(ds => ({
                        label: ds.label,
                        data: ds.data,
                        borderColor: ds.color,
                        backgroundColor: ds.color + '44',
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 3
                    }))
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
                    scales: { y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 } } }, x: { grid: { display: false }, ticks: { font: { size: 10 } } } }
                }
            });
        }

        function updateRanks(data) {
            const presale = data.filter(d => d._type === '預售屋');
            const used = data.filter(d => d._type === '中古屋');

            // 預售單價榜
            const pPrice = [...presale].sort((a,b) => b._unitPrice - a._unitPrice).slice(0,5);
            document.getElementById('presalePriceRank').innerHTML = pPrice.map((d, i) => `
                <li class="flex justify-between items-center"><span class="text-slate-400 w-4">${i+1}</span> <span class="flex-1 font-medium truncate ml-2">${d._name}</span> <span class="font-bold text-orange-600">${d._unitPrice.toFixed(1)}</span></li>
            `).join('');

            // 預售銷量榜
            const counts = {};
            presale.forEach(d => counts[d._name] = (counts[d._name] || 0) + 1);
            const pCount = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0,5);
            document.getElementById('presaleCountRank').innerHTML = pCount.map((d, i) => `
                <li class="flex justify-between items-center"><span class="text-slate-400 w-4">${i+1}</span> <span class="flex-1 font-medium truncate ml-2">${d[0]}</span> <span class="font-bold text-orange-600">${d[1]} 戶</span></li>
            `).join('');

            // 中古單價榜
            const uPrice = [...used].sort((a,b) => b._unitPrice - a._unitPrice).slice(0,5);
            document.getElementById('usedPriceRank').innerHTML = uPrice.map((d, i) => `
                <li class="flex justify-between items-center"><span class="text-slate-400 w-4">${i+1}</span> <span class="flex-1 font-medium truncate ml-2">${d._name}</span> <span class="font-bold text-indigo-600">${d._unitPrice.toFixed(1)}</span></li>
            `).join('');
        }

        // AI 分析功能
        async function generateAIAnalysis() {
            const key = document.getElementById('apiKey').value;
            if (!key) return alert("請先於右上方輸入 Gemini API Key");
            
            const display = document.getElementById('aiContent');
            display.innerText = "數據分析中，請稍候...";

            const summary = {
                type: document.getElementById('typeFilter').value,
                district: document.getElementById('districtFilter').value,
                presaleTop: document.getElementById('presalePriceRank').innerText.replace(/\n/g, ', '),
                usedTop: document.getElementById('usedPriceRank').innerText.replace(/\n/g, ', ')
            };

            const prompt = `你是一位資深房地產分析師。請針對以下數據：區域「${summary.district}」、房產類型「${summary.type}」、前五大高單價建案「${summary.presaleTop}」，提供三點專業的市場趨勢觀察與買方建議。請用簡潔的繁體中文回答。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    display.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                } else {
                    display.innerText = "AI 回傳格式異常，請確認 API Key 是否有效。";
                }
            } catch (error) {
                display.innerText = "無法連接 AI：請確認網路連線或 API Key 權限。";
            }
        }
    </script>
</body>
</html>
