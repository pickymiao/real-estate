<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>房產數據決策系統 v15.0 | 聯動分析旗艦版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <nav class="bg-white/90 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📊</span>
            <h1 class="text-xl font-black tracking-tight text-slate-800">房產聯動決策系統 <span class="text-xs font-bold text-white bg-indigo-600 px-2 py-1 rounded-full ml-2">V15.0</span></h1>
        </div>
        <div class="flex gap-4">
            <button onclick="switchTab('dashboard')" class="px-5 py-2 rounded-xl font-bold transition-all hover:bg-slate-100" id="tab-dash">數據儀表板</button>
            <button onclick="switchTab('admin')" class="px-5 py-2 rounded-xl font-bold bg-slate-900 text-white hover:bg-slate-800 transition-all shadow-md" id="tab-admin">⚙️ 系統管理</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 space-y-8">
        <div id="view-dashboard" class="space-y-8">
            
            <div class="bg-gradient-to-br from-indigo-900 via-slate-900 to-black rounded-3xl p-8 text-white shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h2 class="text-2xl font-bold flex items-center gap-3">✨ AI 市場聯動分析報告</h2>
                            <p class="text-indigo-200 mt-1 opacity-80">自動分析預售拉抬、中古補漲及區域性社區名推論</p>
                        </div>
                        <button onclick="runAI()" class="bg-indigo-500 hover:bg-indigo-400 text-white px-8 py-3 rounded-2xl font-black transition shadow-xl border border-indigo-400/50">生成最新分析</button>
                    </div>
                    <div id="ai-content" class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-6 min-h-[180px] leading-relaxed text-slate-100 text-lg">
                        <div class="flex flex-col items-center justify-center py-10 opacity-50">
                            <span class="text-4xl mb-2">📥</span>
                            <p>請先前往「系統管理」上傳中古屋與預售屋數據</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-black mb-4 flex items-center gap-2 text-amber-600">🔥 預售屋熱門建案 Top 5</h3>
                    <div id="presale-top5" class="space-y-3"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-lg font-black mb-4 flex items-center gap-2 text-indigo-600">🏛️ 中古屋高標社區 Top 5</h3>
                    <div id="secondhand-top5" class="space-y-3"></div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="mb-6">
                    <h3 class="text-xl font-bold text-slate-800">📉 每月成交均價變化趨勢</h3>
                    <p class="text-sm text-slate-500">提示：將滑鼠移至節點上可查看當月「最高單價案」</p>
                </div>
                <div class="h-[450px]">
                    <canvas id="mainTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div id="view-admin" class="hidden max-w-2xl mx-auto py-10">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-200">
                <h2 class="text-2xl font-black mb-8 text-slate-800 border-b pb-4">⚙️ 系統與數據配置</h2>
                <div class="space-y-8">
                    <div>
                        <label class="block text-sm font-black text-slate-500 mb-2 tracking-widest uppercase">Gemini API Key</label>
                        <input type="password" id="apiKeyInput" class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 outline-none transition-all font-mono">
                    </div>
                    <div class="space-y-6">
                        <div class="p-6 bg-amber-50 rounded-2xl border border-amber-100">
                            <label class="block text-sm font-black text-amber-800 mb-2">1. 預售屋資料來源 (B檔)</label>
                            <input type="file" id="csvB" accept=".csv" class="w-full text-sm">
                        </div>
                        <div class="p-6 bg-indigo-50 rounded-2xl border border-indigo-100">
                            <label class="block text-sm font-black text-indigo-800 mb-2">2. 中古屋資料來源 (A檔)</label>
                            <input type="file" id="csvA" accept=".csv" class="w-full text-sm">
                            <p class="text-[10px] text-indigo-400 mt-2 italic">※ 系統將自動過濾非住家買賣、剔除重複編號</p>
                        </div>
                    </div>
                    <button onclick="processFiles()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200">立即同步並執行分析</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let secondHandData = [];
        let preSaleData = [];
        let monthlyStats = {}; 
        let charts = {};

        window.onload = () => {
            const savedKey = localStorage.getItem('housing_api_key');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        };

        function switchTab(tab) {
            document.getElementById('view-dashboard').classList.toggle('hidden', tab !== 'dashboard');
            document.getElementById('view-admin').classList.toggle('hidden', tab !== 'admin');
        }

        async function processFiles() {
            const fileA = document.getElementById('csvA').files[0];
            const fileB = document.getElementById('csvB').files[0];
            const key = document.getElementById('apiKeyInput').value;

            if (key) localStorage.setItem('housing_api_key', key);
            if (!fileA || !fileB) return alert("請確認兩份檔案皆已選擇。");

            const parseFile = (file) => new Promise(res => Papa.parse(file, { header: true, complete: res }));
            const [resA, resB] = await Promise.all([parseFile(fileA), parseFile(fileB)]);

            // 數據清洗邏輯：去重、過濾用途
            secondHandData = cleanData(resA.data, true);
            preSaleData = cleanData(resB.data, false);

            refreshUI();
            switchTab('dashboard');
        }

        function cleanData(data, filterResidential) {
            const seenIds = new Set();
            return data.filter(row => {
                // 1. 去重檢查 (利用編號或移轉編號)
                const id = row['編號'] || row['移轉編號'];
                if (!id || seenIds.has(id)) return false;
                seenIds.add(id);

                // 2. 中古屋過濾非住家
                if (filterResidential) {
                    const use = row['主要用途'] || "";
                    const type = row['交易標的'] || "";
                    if (!use.includes('住家') && !use.includes('見其他')) return false;
                    if (!type.includes('房地')) return false;
                }
                return row['單價元平方公尺'];
            });
        }

        function refreshUI() {
            renderTop5('presale-top5', preSaleData, '建案名稱', 'amber');
            renderTop5('secondhand-top5', secondHandData, '土地位置建物門牌', 'indigo');
            renderMainChart();
        }

        function renderTop5(containerId, data, nameField, color) {
            const container = document.getElementById(containerId);
            const grouped = {};
            data.forEach(r => {
                const name = r[nameField] ? r[nameField].split('號')[0] : "未知區域";
                if (!grouped[name]) grouped[name] = { sum: 0, count: 0 };
                grouped[name].sum += (parseFloat(r['單價元平方公尺']) * 3.3058 / 10000);
                grouped[name].count++;
            });

            const top5 = Object.entries(grouped)
                .map(([name, s]) => ({ name, avg: (s.sum / s.count).toFixed(1) }))
                .sort((a, b) => b.avg - a.avg)
                .slice(0, 5);

            container.innerHTML = top5.map((item, i) => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-${color}-50 border border-${color}-100">
                    <span class="text-sm font-bold text-slate-700 truncate w-2/3"><span class="mr-2 opacity-50">${i+1}.</span>${item.name}</span>
                    <span class="text-sm font-black text-${color}-700">${item.avg} <span class="text-[10px] font-normal">萬/坪</span></span>
                </div>
            `).join('');
        }

        function renderMainChart() {
            const statsA = processMonthly(secondHandData);
            const statsB = processMonthly(preSaleData);
            const months = Array.from(new Set([...Object.keys(statsA), ...Object.keys(statsB)])).sort();

            const ctx = document.getElementById('mainTrendChart').getContext('2d');
            if (charts.main) charts.main.destroy();

            charts.main = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [
                        { label: '預售屋均價', data: months.map(m => statsB[m]?.avg || null), borderColor: '#f59e0b', backgroundColor: '#f59e0b', tension: 0.3, borderWidth: 4, pointRadius: 5 },
                        { label: '中古屋均價', data: months.map(m => statsA[m]?.avg || null), borderColor: '#6366f1', backgroundColor: '#6366f1', tension: 0.3, borderWidth: 4, pointRadius: 5 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            padding: 15,
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            callbacks: {
                                label: function(context) {
                                    const month = context.label;
                                    const datasetIndex = context.datasetIndex;
                                    const targetStats = datasetIndex === 0 ? statsB[month] : statsA[month];
                                    
                                    if (!targetStats) return "";
                                    
                                    const lines = [
                                        `均價：${context.parsed.y} 萬/坪`,
                                        `-----------------`,
                                        `👑 當月最高價：${targetStats.maxPrice} 萬/坪`,
                                        `🏢 標的：${targetStats.maxName}`
                                    ];
                                    return lines;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { title: { display: true, text: '萬/坪' }, grid: { borderDash: [5, 5] } }
                    }
                }
            });
        }

        function processMonthly(data) {
            const stats = {};
            data.forEach(r => {
                const month = r['交易年月日'] ? r['交易年月日'].substring(0, 5) : null;
                const unitPriceSqM = parseFloat(r['單價元平方公尺']);
                if (!month || isNaN(unitPriceSqM)) return;

                const pricePerPing = (unitPriceSqM * 3.3058 / 10000);
                const name = r['建案名稱'] || r['土地位置建物門牌'].split('號')[0];

                if (!stats[month]) {
                    stats[month] = { sum: 0, count: 0, maxPrice: 0, maxName: "" };
                }
                stats[month].sum += pricePerPing;
                stats[month].count++;

                if (pricePerPing > stats[month].maxPrice) {
                    stats[month].maxPrice = pricePerPing.toFixed(1);
                    stats[month].maxName = name;
                }
            });
            Object.keys(stats).forEach(m => stats[m].avg = (stats[m].sum / stats[m].count).toFixed(1));
            return stats;
        }

        async function runAI() {
            const key = localStorage.getItem('housing_api_key');
            if (!key) return alert("請先設定 API Key");
            const aiDisplay = document.getElementById('ai-content');
            aiDisplay.innerHTML = `<div class="flex items-center gap-3"><div class="animate-spin">🌀</div> AI 正在交叉比對兩份資料庫...</div>`;

            // 準備摘要數據給 AI
            const sampleA = secondHandData.slice(0, 15).map(r => `${r['土地位置建物門牌'].substring(0, 15)}... : ${ (parseFloat(r['單價元平方公尺'])*3.3058/10000).toFixed(1) }萬/坪`).join('\n');
            const sampleB = preSaleData.slice(0, 15).map(r => `${r['建案名稱']} : ${ (parseFloat(r['單價元平方公尺'])*3.3058/10000).toFixed(1) }萬/坪`).join('\n');

            const prompt = `你是新北房產策略專家。請根據數據分析：
            1. 比較預售屋與中古屋在該區的「溢價率」。
            2. 分析「最高成交價」案件對周邊中古社區的價格外溢效應。
            3. 重點：根據巷弄路段，嘗試推論中古屋樣本可能屬於哪些知名社區，並給出理由。
            數據樣本：
            中古屋：\n${sampleA}\n
            預售屋：\n${sampleB}
            請用繁體中文報告。`;

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const res = await resp.json();
                aiDisplay.innerHTML = res.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (e) {
                aiDisplay.innerHTML = "AI 連線失敗，請檢查 Key。";
            }
        }
    </script>
</body>
</html>
